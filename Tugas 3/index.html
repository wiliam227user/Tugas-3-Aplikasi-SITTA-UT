<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Bahan Ajar SITTA UT</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
</head>
<body>

<div id="app">
    <h1>Aplikasi SITTA Universitas Terbuka</h1>
    <nav>
        <button :class="{ active: tab === 'stok' }" @click="tab='stok'">📦 Stok Bahan Ajar</button>
        <button :class="{ active: tab === 'tracking' }" @click="tab='tracking'">🚚 Tracking DO</button>
        <button :class="{ active: tab === 'order' }" @click="tab='order'">📝 Buat Pesanan Baru</button>
    </nav>

    <!-- Content Sections dengan v-show untuk Conditionals -->
    <section v-show="tab === 'stok'">
        <ba-stock-table :items="state.stok" :upbjj-list="state.upbjjList" :kategori-list="state.kategoriList"></ba-stock-table>
    </section>

    <section v-show="tab === 'tracking'">
        <do-tracking :tracking-data="state.tracking"></do-tracking>
    </section>

    <section v-show="tab === 'order'">
        <order-form 
            :paket-list="state.paket" 
            :pengiriman-list="state.pengirimanList" 
            :upbjj-list="state.upbjjList"
            :existing-trackings="state.tracking"
            @new-order="handleNewOrder">
        </order-form>
    </section>
</div>

<!-- ================= TEMPLATES ================= -->

<!-- 1. Template Status Badge -->
<template id="tpl-badge">
    <span :class="statusData.class">
        {{ statusData.icon }} {{ statusData.label }}
    </span>
</template>

<!-- 2. Template Stok Table -->
<template id="tpl-stock">
    <div>
        <div class="filter-box">
            <h3>Filter & Sorting Data Stok</h3>
            <label>UT-Daerah: </label>
            <select v-model="filter.upbjj">
                <option value="">-- Semua Daerah --</option>
                <option v-for="(daerah, index) in upbjjList" :key="index" :value="daerah">{{ daerah }}</option>
            </select>

            <!-- Conditionals: Kategori Muncul Jika Daerah Dipilih -->
            <span v-if="filter.upbjj !== ''">
                <label> Kategori: </label>
                <select v-model="filter.kategori">
                    <option value="">-- Semua Kategori --</option>
                    <option v-for="(kat, index) in kategoriList" :key="index" :value="kat">{{ kat }}</option>
                </select>
            </span>

            <label>
                <input type="checkbox" v-model="filter.reorder"> Tampilkan Hanya Butuh Re-order (Warning/Kosong)
            </label>
            <button class="btn-primary" @click="resetFilter" style="margin-left:10px;">Reset Filter</button>
        </div>

        <div class="form-box">
            <h3>{{ editIndex === -1 ? 'Tambah Data Stok' : 'Edit Data Stok' }}</h3>
            <input type="text" v-model="formItem.kode" placeholder="Kode MK" @keyup.enter="saveItem">
            <input type="text" v-model="formItem.judul" placeholder="Judul MK" @keyup.enter="saveItem">
            <select v-model="formItem.kategori" @keyup.enter="saveItem">
                <option value="" disabled>Pilih Kategori</option>
                <option v-for="kat in kategoriList" :value="kat">{{ kat }}</option>
            </select>
            <input type="number" v-model="formItem.qty" placeholder="Qty" @keyup.enter="saveItem">
            <input type="number" v-model="formItem.safety" placeholder="Safety Stock" @keyup.enter="saveItem">
            <input type="number" v-model="formItem.harga" placeholder="Harga" @keyup.enter="saveItem">
            <input type="text" v-model="formItem.catatanHTML" placeholder="Catatan (HTML text)" @keyup.enter="saveItem">
            <button class="btn-primary" @click="saveItem">Simpan (Atau Tekan Enter)</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Kode</th>
                    <th @click="sortBy('judul')">Judul (Sort ⇅)</th>
                    <th>Kategori</th>
                    <th>UT-Daerah</th>
                    <th @click="sortBy('harga')">Harga (Sort ⇅)</th>
                    <th @click="sortBy('qty')">Qty (Sort ⇅)</th>
                    <th>Safety</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>
                <tr v-for="(item, index) in filteredAndSortedData" :key="item.kode">
                    <td v-text="item.kode"></td>
                    <td v-text="item.judul"></td>
                    <td v-text="item.kategori"></td>
                    <td v-text="item.upbjj"></td>
                    <!-- Implementasi Konsep Filter -->
                    <td>{{ item.harga | currency }}</td>
                    <td>{{ item.qty | satuanFormat }}</td>
                    <td>{{ item.safety | satuanFormat }}</td>
                    <td>
                        <div class="tooltip-container" @mouseover="hoveredNote = item.kode" @mouseleave="hoveredNote = null">
                            <status-badge :qty="item.qty" :safety="item.safety"></status-badge>
                            <!-- v-html untuk render HTML catatan dan hover events -->
                            <div class="tooltip-box" v-show="hoveredNote === item.kode && item.catatanHTML" v-html="item.catatanHTML"></div>
                        </div>
                    </td>
                    <td>
                        <button class="btn-primary" @click="editItem(item, index)">Edit</button>
                        <button class="btn-danger" @click="deleteItem(index)">Hapus</button>
                    </td>
                </tr>
                <!-- V-if jika data kosong -->
                <tr v-if="filteredAndSortedData.length === 0">
                    <td colspan="9" style="text-align:center;">Tidak ada data ditemukan.</td>
                </tr>
            </tbody>
        </table>
    </div>
</template>

<!-- 3. Template Tracking -->
<template id="tpl-tracking">
    <div class="filter-box">
        <h2>Tracking Delivery Order</h2>
        <input type="text" v-model="searchQuery" placeholder="Cari No DO atau NIM..." @keyup.enter="searchDO" @keyup.esc="clearSearch">
        <button class="btn-primary" @click="searchDO">Cari (Enter)</button>
        <button @click="clearSearch">Reset (Esc)</button>

        <div v-if="searchResult" style="margin-top:20px; padding: 15px; border: 1px solid #003366; background: #eef;">
            <h3>Hasil Tracking: {{ searchResult.id }}</h3>
            <p><strong>NIM/Nama:</strong> {{ searchResult.data.nim }} - {{ searchResult.data.nama }}</p>
            <p><strong>Status:</strong> {{ searchResult.data.status }}</p>
            <p><strong>Ekspedisi:</strong> {{ searchResult.data.ekspedisi }}</p>
            <p><strong>Tanggal Kirim:</strong> {{ searchResult.data.tanggalKirim | dateFormat }}</p>
            
            <h4>Riwayat Perjalanan:</h4>
            <ul>
                <li v-for="(p, i) in searchResult.data.perjalanan" :key="i">
                    <b>{{ p.waktu }}</b> - {{ p.keterangan }}
                </li>
            </ul>
        </div>
    </div>
</template>

<!-- 4. Template Order Form -->
<template id="tpl-order">
    <div class="form-box">
        <h2>Buat Delivery Order Baru</h2>
        <p><strong>No DO (Auto):</strong> {{ generateDONumber }}</p>
        
        <label>NIM:</label><br>
        <input type="text" v-model="form.nim"><br>
        
        <label>Nama Mahasiswa:</label><br>
        <input type="text" v-model="form.nama"><br>
        
        <label>Ekspedisi:</label><br>
        <select v-model="form.ekspedisi">
            <option v-for="eks in pengirimanList" :value="eks.nama">{{ eks.nama }}</option>
        </select><br>

        <label>Paket Bahan Ajar:</label><br>
        <select v-model="form.paketKode">
            <option value="" disabled>-- Pilih Paket --</option>
            <option v-for="paket in paketList" :value="paket.kode">{{ paket.kode }} - {{ paket.nama }}</option>
        </select><br>

        <div v-if="selectedPaketDetail" style="background:#f4f4f4; padding: 10px; margin: 10px 0;">
            <b>Detail Isi Paket:</b>
            <ul>
                <li v-for="isi in selectedPaketDetail.isi">{{ isi }}</li>
            </ul>
            <b>Total Harga:</b> {{ selectedPaketDetail.harga | currency }}
        </div>

        <label>Tanggal Kirim:</label><br>
        <input type="date" v-model="form.tanggalKirim"><br><br>

        <button class="btn-primary" @click="submitOrder">Simpan Order</button>
    </div>
</template>

<!-- ================= SCRIPTS ================= -->
<script src="js/services/api.js"></script>
<script src="js/components/status-badge.js"></script>
<script src="js/components/stock-table.js"></script>
<script src="js/components/do-tracking.js"></script>
<script src="js/components/order-form.js"></script>
<script src="js/app.js"></script>

</body>
</html>
